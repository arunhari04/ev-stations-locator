<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_edit %}Edit{% else %}Add{% endif %} Brand - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/includes/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <div class="d-flex align-items-center gap-3">
                    <a href="{% url 'admin-brands' %}" class="btn btn-light rounded-circle p-2">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </a>
                    <div>
                        <h4 class="fw-bold mb-0">{% if is_edit %}Edit{% else %}Add New{% endif %} Brand</h4>
                        <p class="text-muted mb-0 small">{% if is_edit %}Update{% else %}Create a new{% endif %} vehicle
                            brand</p>
                    </div>
                </div>
            </header>
            <div class="p-4">
                <div class="card border-0 shadow-sm rounded-4 mx-auto" style="max-width: 600px;">
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-medium">Brand Name</label>
                                <input type="text" name="name" class="form-control" placeholder="e.g. Tesla"
                                    value="{{ form.name.value|default:'' }}" required>
                                {% if form.name.errors %}
                                <div class="text-danger small mt-1">{{ form.name.errors.0 }}</div>
                                {% endif %}
                            </div>
                            <div class="d-flex gap-3">
                                <a href="{% url 'admin-brands' %}" class="btn btn-light flex-grow-1 fw-bold">Cancel</a>
                                <button type="submit" class="btn btn-emerald text-white flex-grow-1 fw-bold">
                                    {% if is_edit %}Update{% else %}Create{% endif %} Brand
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
