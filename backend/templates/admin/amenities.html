<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amenities - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100">
            <header class="bg-white border-bottom px-4 py-3 sticky-top">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="fw-bold mb-0">Amenities</h4>
                        <p class="text-muted mb-0 small">Manage station amenities</p>
                    </div>
                    <a href="{% url 'admin-add-amenity' %}"
                        class="btn btn-emerald text-white fw-bold d-flex align-items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add Amenity
                    </a>
                </div>
            </header>
            <div class="p-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Name</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small">Category</th>
                                    <th class="px-4 py-3 text-secondary text-uppercase small text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for amenity in amenities %}
                                <tr>
                                    <td class="px-4 py-3 fw-medium">{{ amenity.name }}</td>
                                    <td class="px-4 py-3">
                                        <span class="badge bg-light text-dark border">{{ amenity.get_category_display }}</span>
                                    </td>
                                    <td class="px-4 py-3 text-end">
                                        <div class="d-flex justify-content-end gap-2">
                                            <a href="{% url 'admin-amenity-edit' amenity.pk %}"
                                                class="btn btn-sm btn-light text-primary">
                                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                                            </a>
                                            <a href="{% url 'admin-amenity-delete' amenity.pk %}"
                                                class="btn btn-sm btn-light text-danger">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="2" class="text-center py-4 text-muted">No amenities found.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
