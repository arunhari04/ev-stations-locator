<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Station - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar-container">
            {% include 'admin/sidebar.html' %}
        </div>
        <main class="flex-grow-1 overflow-auto vh-100 d-flex align-items-center justify-content-center">
            <div class="card border-0 shadow-lg rounded-4 p-4" style="max-width: 500px; width: 100%;">
                <div class="card-body text-center">
                    <div class="mb-4 text-danger">
                        <i data-lucide="alert-triangle" class="w-16 h-16 mx-auto"
                            style="width: 64px; height: 64px;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Delete Station?</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete <strong>{{ station.name }}</strong>?
                        This action cannot be undone and will remove all associated data including chargers and
                        amenities.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg fw-bold">Yes, Delete Station</button>
                            <a href="{% url 'admin-stations' %}" class="btn btn-light btn-lg fw-bold">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
