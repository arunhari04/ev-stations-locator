<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-light">
    <div id="login-screen" class="min-vh-100 d-flex align-items-center justify-content-center bg-dark-gradient">
        <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 450px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-emerald text-white rounded-3 d-inline-flex align-items-center justify-content-center mb-3 shadow"
                        style="width: 64px; height: 64px;">
                        <i data-lucide="lock" class="w-8 h-8"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Admin Portal</h2>
                    <p class="text-muted">Sign in to manage charging stations</p>
                </div>
                <form id="login-form" method="post" action="{% url 'admin-login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Admin Email</label>
                        <input type="email" class="form-control form-control-lg fs-6" id="email" name="username"
                            placeholder="admin@chargepoint.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Password</label>
                        <input type="password" class="form-control form-control-lg fs-6" id="password" name="password"
                            placeholder="••••••••" required>
                    </div>
                    {% if form.errors %}
                    <div id="login-error" class="text-danger small mb-3">
                        Invalid email or password.
                    </div>
                    {% endif %}
                    {% if error %}
                    <div id="login-error" class="text-danger small mb-3">
                        {{ error }}
                    </div>
                    {% endif %}
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-emerald text-decoration-none small fw-bold">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-emerald w-100 py-3 rounded-3 fw-bold" id="login-btn">
                        <span class="normal-text">Sign In to Dashboard</span>
                        <span class="loading-text d-none">Signing in...</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="{% static 'admin/js/auth.js' %}?v=2"></script>
</body>

</html>
