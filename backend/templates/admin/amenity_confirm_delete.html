<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Amenity - ChargePoint Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'admin/css/style.css' %}">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card border-0 shadow-lg rounded-4 p-4 text-center" style="max-width: 400px; width: 100%;">
        <div class="card-body">
            <h5 class="fw-bold text-danger mb-3">Delete Amenity?</h5>
            <p class="text-muted mb-4">Are you sure you want to delete "{{ object.name }}"? This action cannot be
                undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3">
                    <a href="{% url 'admin-amenities' %}" class="btn btn-light flex-grow-1 fw-bold">Cancel</a>
                    <button type="submit" class="btn btn-danger flex-grow-1 fw-bold">Delete</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
